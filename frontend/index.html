<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeanBotics</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>&#9749; BeanBotics</h1>
        <p class="tagline">AI-Powered Coffee, Perfectly Brewed</p>
    </header>

    <main>
        <section id="menu-section">
            <h2>Menu</h2>
            <div id="menu-list" class="menu-grid">
                <p class="loading">Loading menu...</p>
            </div>
        </section>

        <section id="orders-section">
            <h2>Your Pending Order</h2>
            <div id="orders-list">
                <p class="empty-state">No items added yet. Pick a drink from the menu.</p>
            </div>
            <button id="place-order-btn" class="place-order-btn" type="button">
                Place Your Order
            </button>
            <div id="previous-orders-section" class="previous-orders hidden">
                <h3>Previous Orders</h3>
                <div id="previous-orders-list"></div>
            </div>
        </section>

        <section id="summary-section" class="hidden">
            <h2>Order Summary</h2>
            <div id="summary-items"></div>
            <p id="summary-total" class="summary-total"></p>
            <button id="confirm-summary-btn" class="confirm-btn" type="button">Confirm</button>
            <button id="back-to-menu-btn" class="back-btn" type="button">Back To Menu</button>
        </section>
    </main>

    <footer>
        <p>BeanBotics Corporation &mdash; Spec-Driven Development Lab</p>
    </footer>

    <script src="/static/script.js?v=20260608-4"></script>
</body>
</html>
